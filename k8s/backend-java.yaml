apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-java
  template:
    metadata:
      labels:
        app: backend-java
    spec:
      containers:
      - name: backend-java
        image: ghcr.io/your-org/backend-java:latest
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: jwt-secret
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-java
spec:
  selector:
    app: backend-java
  ports:
  - port: 80
    targetPort: 8080
